name: Update Repository Topics

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  update-topics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      metadata: write
    steps:
    - name: Update repository topics
      uses: actions/github-script@v7
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const topics = [
            'python',
            'jupyter-notebook', 
            'optimization',
            'operations-research',
            'logistics',
            'supply-chain',
            'machine-learning',
            'artificial-intelligence',
            'metaheuristics',
            'digital-twin',
            'simulation',
            'educational',
            'tutorial',
            'data-science',
            'algorithms',
            'linear-programming',
            'genetic-algorithm',
            'reinforcement-learning',
            'warehouse-management',
            'transportation',
            'inventory-management',
            'heuristics'
          ];
          
          try {
            await github.rest.repos.replaceAllTopics({
              owner: context.repo.owner,
              repo: context.repo.repo,
              names: topics
            });
            
            console.log('Repository topics updated successfully!');
          } catch (error) {
            console.log('Error updating topics:', error.message);
            console.log('This might be due to API rate limits or permissions.');
            // Don't fail the workflow if topics can't be updated
          }
